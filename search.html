<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Search for your ICDL certificate by ID. Instantly verify your certificate status (still found at MUST ICDL center or not).">
  <title>Certificate Search — ICDL Verify</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ===== Navbar ===== -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar__logo">
        <span class="navbar__logo-icon">🎓</span>
        ICDL Verify
      </a>
      <div class="navbar__links">
        <a href="index.html">Home</a>
        <a href="search.html" class="active">Search</a>
        <a href="index.html#contact">Contact</a>
      </div>
    </div>
  </nav>

  <!-- ===== Search Section ===== -->
  <main class="container">
    <div class="search-wrapper">

      <!-- Header -->
      <div class="search-header">
        <h1>Certificate Search</h1>
        <p>Enter your MUST ID to view your results (in range 37495 to 200035409).</p>
      </div>

      <!-- Search Form -->
      <form id="searchForm" class="search-form" action="search.html" method="get">
        <input type="text" id="idInput" name="id" class="search-form__input" placeholder="ID number" autocomplete="on"
          maxlength="9" inputmode="numeric" aria-label="MUST ID">
        <button type="submit" id="searchBtn" class="btn btn--primary">
          Search
        </button>
      </form>

      <!-- Inline validation error -->
      <div id="formError" class="form-error" role="alert"></div>

      <!-- Cookie hint -->
      <div id="cookieHint" class="cookie-hint" style="display: none;"></div>

      <!-- Loading spinner -->
      <div id="loadingSpinner" class="spinner-wrapper" aria-live="polite">
        <div class="spinner"></div>
      </div>

      <!-- Results section -->
      <div id="resultsSection" class="result-section" aria-live="polite"></div>

      <!-- Information -->
      <div class="search-info"
        style="margin-top: 2rem; font-size: 0.95rem; color: var(--text-secondary); text-align: center;">
        <p>ICDL center location: Room 418 SS building (last door in coridour).</p>
      </div>

    </div>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <div class="container">
      <p class="footer__text">
        © <span id="footerYear"></span> ICDL Certificate Verification System. All rights reserved.<br>
        <span class="version" style="font-size: 0.85em; opacity: 0.7;">v1.01</span>
      </p>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>

</html>
